<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>项目文档浏览器</title>
    <link rel="stylesheet" href="/web/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Epic of Viento Line 文档浏览器</h1>
      <p>自动扫描 design-data 目录，新增文档后刷新即可更新</p>
    </header>
    <main class="layout">
      <aside class="left">
        <div class="toolbar">
          <input id="searchInput" type="text" placeholder="搜索文档名 / 路径" />
          <div id="status" class="status">正在加载文档索引...</div>
        </div>
        <div id="docList" class="doc-list">加载中…</div>
      </aside>
      <section class="right">
        <div class="doc-meta">
          <div id="docTitle">未选择文档</div>
          <div id="docPath" class="meta-path"></div>
        </div>
        <div id="heroBanner" class="hero-banner"></div>
        <div id="metaCards" class="meta-grid"></div>
        <div id="sectionCards" class="meta-grid"></div>
        <div id="heroGallery" class="gallery"></div>
        <pre id="docContent" class="content">请先在左侧选择一份文档。</pre>
      </section>
    </main>
    <script type="module" src="/web/app.js"></script>
  </body>
</html>
